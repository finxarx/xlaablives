<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xlaab - Webinarios ao Vivo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --accent: #6c5ce7;
            --accent-light: #7c6ce7;
            --text: #e0e0e0;
            --text-dim: #8b949e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 3rem;
            letter-spacing: -1px;
        }
        .btn-presenter {
            display: inline-block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 1.2rem 3rem;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
        }
        .btn-presenter:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }
        .footer {
            position: fixed;
            bottom: 1.5rem;
            text-align: center;
            width: 100%;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Xlaab</div>
        <a href="/presenter" class="btn-presenter">Apresentar Webinario</a>
    </div>
    <div class="footer">Todos os direitos reservados Xlaab</div>
</body>
</html>
