    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-light: #21262d;
            --accent: #6c5ce7;
            --accent-light: #7c6ce7;
            --text: #e0e0e0;
            --text-dim: #8b949e;
            --border: #30363d;
            --success: #31a24c;
            --danger: #da3633;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .join-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f1117 0%, #1a0033 100%);
        }

        .join-container {
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #6c5ce7 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            letter-spacing: -2px;
        }

        .join-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .join-subtitle {
            color: var(--text-dim);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface-light);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .btn {
            padding: 0.875rem 2rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7 0%, #a78bfa 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
        }

        .error-message {
            padding: 1rem;
            background: rgba(218, 54, 51, 0.15);
            border: 1px solid var(--danger);
            border-radius: 0.5rem;
            color: var(--danger);
            text-align: center;
            margin-bottom: 1rem;
        }

        .webinar-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .webinar-screen.active {
            display: flex;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 70px;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .top-bar-logo {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #6c5ce7 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .room-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.waiting {
            background: rgba(108, 92, 231, 0.2);
            color: #a78bfa;
        }
