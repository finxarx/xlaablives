<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xlaablives — Webinário</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --accent: #6c5ce7;
      --accent-hover: #7d6ff0;
      --text: #e8e8ed;
      --text-muted: #8b8d9a;
      --success: #00b894;
      --danger: #e74c3c;
      --border: #2d3140;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TELA DE ENTRADA ── */
    #join-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .join-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .join-card h1 {
      font-size: 24px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .join-card .room-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .join-card .room-status {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      width: 100%;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* ── WEBINÁRIO ── */
    #webinar-screen {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .room-title {
      font-size: 15px;
      color: var(--text-muted);
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-waiting { background: var(--surface2); color: var(--text-muted); }
    .badge-live { background: rgba(0,184,148,0.15); color: var(--success); animation: pulse 2s infinite; }
    .badge-ended { background: rgba(231,76,60,0.15); color: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* ── SLIDE AREA ── */
    .slide-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 20px;
      position: relative;
      min-height: 0;
    }

    .slide-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .slide-container canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .slide-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .waiting-message {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
    }

    .waiting-message h2 {
      font-size: 20px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .waiting-message p {
      font-size: 14px;
    }

    .ended-message {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
    }

    .ended-message h2 {
      font-size: 20px;
      color: var(--danger);
      margin-bottom: 8px;
    }

    .slide-indicator {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── CHAT BAR (BOTTOM) ── */
    .chat-bar {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-bar input {
      flex: 1;
      padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .chat-bar input:focus { border-color: var(--accent); }

    .chat-bar button {
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-bar button:hover { background: var(--accent-hover); }

    .chat-bar .hint {
      display: flex;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── SCREEN SHARE OVERLAY ── */
    #screen-share-view {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      background: black;
    }

    #screen-share-view img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── ERROR SCREEN ── */
    #error-screen {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .error-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .error-card h2 { color: var(--danger); margin-bottom: 12px; }
    .error-card p { color: var(--text-muted); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .top-bar { padding: 10px 16px; }
      .slide-area { padding: 12px; }
      .chat-bar { padding: 10px 16px; }
      .chat-bar .hint { display: none; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- TELA: ENTRAR NO WEBINÁRIO -->
  <div id="join-screen">
    <div class="join-card">
      <h1>Xlaablives</h1>
      <div class="room-name" id="join-room-name">Carregando...</div>
      <div class="room-status" id="join-room-status"></div>
      <div class="form-group">
        <label>Seu nome</label>
        <input type="text" id="nickname-input" placeholder="Como quer ser chamado?">
      </div>
      <button class="btn btn-primary" onclick="joinRoom()">Entrar no webinário</button>
    </div>
  </div>

  <!-- TELA: WEBINÁRIO -->
  <div id="webinar-screen">
    <div class="top-bar">
      <div class="top-bar-left">
        <span class="logo">Xlaablives</span>
        <span class="room-title" id="display-title"></span>
      </div>
      <span class="badge badge-waiting" id="status-badge">AGUARDANDO</span>
    </div>

    <div class="main-content">
      <div class="slide-area">
        <div class="slide-container" id="slide-container">
          <div class="waiting-message" id="waiting-msg">
            <h2>O webinário começará em breve</h2>
            <p>Aguarde o apresentador iniciar a transmissão.</p>
          </div>
          <canvas id="pdf-canvas" style="display:none"></canvas>
          <div id="screen-share-view">
            <img id="screen-frame" src="" alt="Tela compartilhada">
          </div>
        </div>
        <div class="slide-indicator" id="slide-indicator" style="display:none">
          Slide <span id="slide-current">1</span> de <span id="slide-total">1</span>
        </div>
      </div>

      <div class="chat-bar">
        <input type="text" id="chat-input" placeholder="Envie uma pergunta ao apresentador..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">Enviar</button>
        <span class="hint">Só o apresentador vê</span>
      </div>
    </div>
  </div>

  <!-- TELA: ERRO -->
  <div id="error-screen">
    <div class="error-card">
      <h2>Webinário não encontrado</h2>
      <p>Verifique o link e tente novamente.</p>
    </div>
  </div>

  <script>
    // ── CONFIG ──
    const SUPABASE_URL = 'https://nvnzyupuecyeepxtiltt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52bnp5dXB1ZWN5ZWVweHRpbHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5ODU3MzEsImV4cCI6MjA5MTU2MTczMX0.xsWsvlR1K66kDtJFtzIKzkpZ5sKa-iwDtL4uIInsif4';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ── STATE ──
    let room = null;
    let participant = null;
    let pdfDoc = null;
    let currentSlide = 0;
    let nickname = '';

    // ── INIT: CARREGAR SALA ──
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('sala');

      if (!slug) {
        showError();
        return;
      }

      const { data, error } = await supabase
        .from('rooms')
        .select('*')
        .eq('slug', slug)
        .single();

      if (error || !data) {
        showError();
        return;
      }

      room = data;
      document.getElementById('join-room-name').textContent = room.title;

      const statusLabels = {
        waiting: 'O apresentador está preparando tudo...',
        live: 'Ao vivo agora!',
        ended: 'Este webinário já encerrou.'
      };
      document.getElementById('join-room-status').textContent = statusLabels[room.status] || '';

      if (room.status === 'ended') {
        document.querySelector('#join-screen .btn-primary').textContent = 'Webinário encerrado';
        document.querySelector('#join-screen .btn-primary').disabled = true;
        document.querySelector('#join-screen .btn-primary').style.opacity = '0.5';
      }
    }

    function showError() {
      document.getElementById('join-screen').style.display = 'none';
      document.getElementById('error-screen').style.display = 'flex';
    }

    // ── ENTRAR NA SALA ──
    async function joinRoom() {
      nickname = document.getElementById('nickname-input').value.trim() || 'Anônimo';

      // Registrar participante
      const { data: p, error } = await supabase
        .from('participants')
        .insert({ room_id: room.id, nickname })
        .select()
        .single();

      if (error) {
        alert('Erro ao entrar: ' + error.message);
        return;
      }

      participant = p;
      showWebinar();
    }

    // ── MOSTRAR WEBINÁRIO ──
    function showWebinar() {
      document.getElementById('join-screen').style.display = 'none';
      document.getElementById('webinar-screen').style.display = 'flex';
      document.getElementById('display-title').textContent = room.title;

      updateStatusBadge();
      setupRealtime();
      loadPdf();

      // Marcar como inativo ao sair
      window.addEventListener('beforeunload', () => {
        if (participant) {
          supabase
            .from('participants')
            .update({ is_active: false })
            .eq('id', participant.id);
        }
      });
    }

    // ── REALTIME ──
    function setupRealtime() {
      // Escutar mudanças na sala (slides, status, screen sharing)
      supabase
        .channel('room-' + room.id)
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'rooms',
          filter: 'id=eq.' + room.id
        }, (payload) => {
          const updated = payload.new;
          room = updated;
          updateStatusBadge();

          // Atualizar slide se mudou
          if (updated.current_slide !== currentSlide && pdfDoc) {
            currentSlide = updated.current_slide;
            renderSlide(currentSlide);
            updateSlideIndicator();
          }

          // Screen sharing toggle
          if (updated.screen_sharing) {
            document.getElementById('screen-share-view').style.display = 'block';
            document.getElementById('pdf-canvas').style.display = 'none';
          } else {
            document.getElementById('screen-share-view').style.display = 'none';
            if (pdfDoc) {
              document.getElementById('pdf-canvas').style.display = 'block';
            }
          }

          // Webinário encerrou
          if (updated.status === 'ended') {
            showEndedMessage();
          }
        })
        .subscribe();

      // Escutar frames de screen share via Broadcast
      supabase
        .channel('screen-' + room.id)
        .on('broadcast', { event: 'screen-frame' }, (payload) => {
          const img = document.getElementById('screen-frame');
          img.src = payload.payload.frame;
        })
        .subscribe();
    }

    // ── PDF ──
    async function loadPdf() {
      if (room.total_slides === 0) return;

      // Buscar PDF do storage
      const { data: files } = await supabase.storage
        .from('slides')
        .list(room.id);

      if (!files || files.length === 0) return;

      const pdfFile = files.find(f => f.name.endsWith('.pdf'));
      if (!pdfFile) return;

      const { data: urlData } = supabase.storage
        .from('slides')
        .getPublicUrl(room.id + '/' + pdfFile.name);

      try {
        pdfDoc = await pdfjsLib.getDocument(urlData.publicUrl).promise;
        currentSlide = room.current_slide;

        document.getElementById('waiting-msg').style.display = 'none';
        document.getElementById('pdf-canvas').style.display = 'block';

        renderSlide(currentSlide);
        updateSlideIndicator();
      } catch (err) {
        console.error('Erro ao carregar PDF:', err);
      }
    }

    async function renderSlide(num) {
      if (!pdfDoc || num < 1 || num > pdfDoc.numPages) return;

      const page = await pdfDoc.getPage(num);
      const canvas = document.getElementById('pdf-canvas');
      const ctx = canvas.getContext('2d');
      const container = document.getElementById('slide-container');

      const containerWidth = container.clientWidth - 20;
      const containerHeight = container.clientHeight - 20;
      const viewport = page.getViewport({ scale: 1 });
      const scale = Math.min(containerWidth / viewport.width, containerHeight / viewport.height);
      const scaledViewport = page.getViewport({ scale });

      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;

      await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;
    }

    function updateSlideIndicator() {
      if (!pdfDoc) return;
      document.getElementById('slide-indicator').style.display = 'block';
      document.getElementById('slide-current').textContent = currentSlide;
      document.getElementById('slide-total').textContent = pdfDoc.numPages;
    }

    // ── CHAT ──
    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';

      await supabase
        .from('chat_messages')
        .insert({
          room_id: room.id,
          participant_id: participant.id,
          nickname: nickname,
          message: message
        });
    }

    // ── STATUS ──
    function updateStatusBadge() {
      const badge = document.getElementById('status-badge');
      badge.className = 'badge badge-' + room.status;
      const labels = { waiting: 'AGUARDANDO', live: 'AO VIVO', ended: 'ENCERRADO' };
      badge.textContent = labels[room.status] || room.status;
    }

    function showEndedMessage() {
      document.getElementById('pdf-canvas').style.display = 'none';
      document.getElementById('screen-share-view').style.display = 'none';
      document.getElementById('slide-indicator').style.display = 'none';
      document.getElementById('slide-container').innerHTML = `
        <div class="ended-message">
          <h2>Webinário encerrado</h2>
          <p>Obrigado por participar!</p>
        </div>
      `;
      document.querySelector('.chat-bar').style.display = 'none';
    }

    // ── WINDOW RESIZE ──
    window.addEventListener('resize', () => {
      if (pdfDoc && currentSlide) renderSlide(currentSlide);
    });

    // ── START ──
    init();
  </script>
</body>
</html>
